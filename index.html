<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>灵感素材库 · 影视级资源分享</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1a2c3e;
        }

        /* 顶部毛玻璃导航 */
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.05);
            padding: 12px 28px;
            z-index: 100;
        }

        .nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #07C160 0%, #059e4a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 28px;
        }

        .nav-links a {
            text-decoration: none;
            color: #2c3e4e;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: #07C160;
        }

        /* 搜索栏 */
        .search-section {
            max-width: 1400px;
            margin: 32px auto 24px;
            padding: 0 28px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            background: white;
            border-radius: 60px;
            padding: 6px 6px 6px 24px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
            border: 0.5px solid #e2e8f0;
        }

        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1rem;
            background: transparent;
            padding: 14px 0;
        }

        .search-bar button {
            background: #07C160;
            border: none;
            border-radius: 50px;
            padding: 0 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-bar button:hover {
            background: #059e4a;
        }

        /* 分类标签栏 */
        .categories {
            max-width: 1400px;
            margin: 24px auto 0;
            padding: 0 28px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            border-bottom: 1px solid #e9edf2;
            padding-bottom: 16px;
        }

        .cat-btn {
            background: none;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #5e6f8d;
            cursor: pointer;
            transition: 0.2s;
        }

        .cat-btn.active {
            background: #07C160;
            color: white;
        }

        /* 筛选栏 */
        .filter-bar {
            max-width: 1400px;
            margin: 20px auto 0;
            padding: 0 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-chip {
            background: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #2c3e4e;
            cursor: pointer;
            border: 0.5px solid #dce3e9;
            transition: 0.2s;
        }

        .filter-chip.active {
            background: #eef5e9;
            border-color: #07C160;
            color: #07C160;
        }

        .sort-btn {
            background: white;
            border: 0.5px solid #dce3e9;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        /* 素材网格 */
        .grid {
            max-width: 1400px;
            margin: 28px auto;
            padding: 0 28px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* iOS 26 风格卡片 */
        .card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            border: 0.5px solid rgba(0, 0, 0, 0.04);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
        }

        .card-preview {
            height: 180px;
            background: linear-gradient(135deg, #e0e8f0 0%, #cbd5e1 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .card-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: white;
        }

        .card-content {
            padding: 18px;
        }

        .card-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 0.75rem;
            color: #7e8c9e;
            margin-bottom: 14px;
            line-height: 1.4;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: #8a99b0;
            margin-bottom: 16px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tag {
            background: #f0f3f8;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 500;
        }

        .download-link {
            background: #07C160;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .download-link:hover {
            background: #059e4a;
        }

        /* 加载更多 */
        .load-more {
            text-align: center;
            margin: 32px auto 48px;
        }

        .load-more button {
            background: white;
            border: 1px solid #dce3e9;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 40px 24px;
            color: #8a99b0;
            font-size: 0.75rem;
            border-top: 0.5px solid #e2e8f0;
            margin-top: 20px;
        }

        @media (max-width: 680px) {
            .navbar { padding: 12px 16px; }
            .nav-links { gap: 16px; }
            .search-section, .categories, .filter-bar, .grid { padding: 0 16px; }
            .grid { gap: 16px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-inner">
        <div class="logo">🎬 灵感素材库</div>
        <div class="nav-links">
            <a href="#">首页</a>
            <a href="#">素材库</a>
            <a href="#">学习</a>
            <a href="#">关于</a>
        </div>
    </div>
</nav>

<div class="search-section">
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜索你想要的素材... 例如：4K 自然 音效">
        <button id="searchBtn">🔍 搜索</button>
    </div>
</div>

<div class="categories" id="categoryTabs">
    <!-- 动态加载分类 -->
</div>

<div class="filter-bar">
    <div class="filter-group" id="filterGroup">
        <span class="filter-chip active" data-filter="all">全部</span>
        <span class="filter-chip" data-filter="4k">4K+</span>
        <span class="filter-chip" data-filter="free">免费</span>
        <span class="filter-chip" data-filter="pro">专业版</span>
    </div>
    <div>
        <span class="sort-btn" id="sortDate">📅 最近更新 ↓</span>
        <span class="sort-btn" id="sortHot">🔥 热度最高</span>
    </div>
</div>

<div class="grid" id="materialGrid">
    <!-- 卡片动态渲染 -->
</div>

<div class="load-more" id="loadMoreBtn">
    <button>加载更多素材 ∨</button>
</div>

<footer>
    <p>© 2026 灵感素材库 · 部分素材来源于影视飓风等开源分享 | 点击跳转官方获取</p>
</footer>

    // ----------------------------- 真实素材库数据（影视飓风风格 + 大量条目） -----------------------------

        { id: 2, title: "自然景观-02 4K", desc: "山巅云海延时摄影，电影感调色", category: "video", quality: "4k", priceType: "free", previewIcon: "🏔️", size: "3.1GB", duration: "00:45", hot: 287, date: "2026-05-19", officialUrl: "https://www.ysjf.com/material/2" },
        { id: 3, title: "黑水摄影-动物特写", desc: "深海奇异生物，超广角微距", category: "video", quality: "4k", priceType: "pro", previewIcon: "🦑", size: "4.2GB", duration: "01:12", hot: 512, date: "2026-05-18", officialUrl: "https://www.ysjf.com/material/3" },
        { id: 4, title: "猫的语｜AI生成梦境", desc: "超现实风格，AI辅助创作短片", category: "video", quality: "hd", priceType: "free", previewIcon: "🐱", size: "890MB", duration: "00:28", hot: 1210, date: "2026-05-17", officialUrl: "https://www.ysjf.com/material/4" },
        { id: 5, title: "梦境生成Skill", desc: "ComfyUI工作流 + 模型", category: "template", quality: "hd", priceType: "free", previewIcon: "🧠", size: "1.8GB", hot: 670, date: "2026-05-16", officialUrl: "https://www.ysjf.com/material/5" },
        { id: 6, title: "4D高斯·云冈石窟", desc: "高斯泼溅重建，沉浸式VR体验", category: "3d", quality: "8k", priceType: "pro", previewIcon: "🏛️", size: "6.7GB", hot: 430, date: "2026-05-15", officialUrl: "https://www.ysjf.com/material/6" },
        { id: 7, title: "香港霓虹灯CG", desc: "赛博朋克城市资产，Blender源文件", category: "3d", quality: "4k", priceType: "pro", previewIcon: "🌃", size: "3.9GB", hot: 865, date: "2026-05-14", officialUrl: "https://www.ysjf.com/material/7" },
        { id: 8, title: "空间视频：香港霓虹灯", desc: "Vision Pro空间视频样片", category: "video", quality: "8k", priceType: "free", previewIcon: "🥽", size: "1.2GB", duration: "00:18", hot: 2100, date: "2026-05-13", officialUrl: "https://www.ysjf.com/material/8" },
        { id: 9, title: "TV制作协议模板", desc: "影视行业PPM文档+合同范本", category: "doc", quality: "doc", priceType: "free", previewIcon: "📄", size: "2.1MB", hot: 398, date: "2026-05-12", officialUrl: "https://www.ysjf.com/material/9" },
        { id: 10, title: "自然景观-01 4K", desc: "森林溪流4K航拍，调色LUT预设", category: "video", quality: "4k", priceType: "free", previewIcon: "🌲", size: "2.8GB", duration: "00:50", hot: 612, date: "2026-05-11", officialUrl: "https://www.ysjf.com/material/10" },
        { id: 11, title: "黑水摄影动物广角正史", desc: "稀有的深海生物记录影像", category: "video", quality: "4k", priceType: "pro", previewIcon: "🐙", size: "5.4GB", duration: "01:25", hot: 330, date: "2026-05-10", officialUrl: "https://www.ysjf.com/material/11" },
        { id: 12, title: "Immersive样片：猫的语", desc: "空间音频+3D景深沉浸样片", category: "video", quality: "8k", priceType: "free", previewIcon: "🎧", size: "3.3GB", duration: "00:34", hot: 821, date: "2026-05-09", officialUrl: "https://www.ysjf.com/material/12" },
        { id: 13, title: "闪电分镜模板", desc: "分镜脚本+动态故事板工具包", category: "template", quality: "hd", priceType: "free", previewIcon: "⚡", size: "124MB", hot: 495, date: "2026-05-08", officialUrl: "https://www.ysjf.com/material/13" },
        { id: 14, title: "环境音效包-城市", desc: "街道、地铁、人群氛围音", category: "audio", quality: "audio", priceType: "free", previewIcon: "🏙️", size: "856MB", hot: 374, date: "2026-05-07", officialUrl: "https://www.ysjf.com/material/14" },
        { id: 15, title: "电影感LUTs合集", desc: "适配达芬奇/PR的30种风格LUT", category: "preset", quality: "lut", priceType: "pro", previewIcon: "🎨", size: "18MB", hot: 1100, date: "2026-05-06", officialUrl: "https://www.ysjf.com/material/15" },
        { id: 16, title: "飓风相机-用户作品集", desc: "用户拍摄的高质量短片合辑", category: "video", quality: "4k", priceType: "free", previewIcon: "📷", size: "7.2GB", duration: "04:20", hot: 2034, date: "2026-05-05", officialUrl: "https://www.ysjf.com/material/16" }
    ];

    // 分类动态提取
    const categoryMap = {
        "video": "视频素材",
        "3d": "3D资产",
        "template": "模板工程",
        "audio": "音频音效",
        "preset": "预设LUT",
        "doc": "文档合同"
    };

    let currentCategory = "all";
    let currentFilter = "all";
    let currentSort = "date";   // date / hot
    let currentSearch = "";
    let visibleCount = 12;       // 初始显示12个，点击加载更多增加

    // 渲染分类tab
    function renderCategories() {
        const container = document.getElementById("categoryTabs");
        let html = `<button class="cat-btn active" data-cat="all">全部</button>`;
        const cats = [...new Set(allMaterials.map(m => m.category))];
        cats.forEach(cat => {
            html += `<button class="cat-btn" data-cat="${cat}">${categoryMap[cat] || cat}</button>`;
        });
        container.innerHTML = html;
        // 绑定事件
        document.querySelectorAll(".cat-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentCategory = btn.dataset.cat;
                visibleCount = 12;
                renderMaterials();
            });
        });
    }

    // 筛选逻辑
    function getFilteredAndSearched() {
        let filtered = [...allMaterials];
        if (currentCategory !== "all") {
            filtered = filtered.filter(m => m.category === currentCategory);
        }
        if (currentFilter !== "all") {
            if (currentFilter === "4k") filtered = filtered.filter(m => m.quality === "4k" || m.quality === "8k");
            if (currentFilter === "free") filtered = filtered.filter(m => m.priceType === "free");
            if (currentFilter === "pro") filtered = filtered.filter(m => m.priceType === "pro");
        }
        if (currentSearch.trim() !== "") {
            const kw = currentSearch.toLowerCase();
            filtered = filtered.filter(m => m.title.toLowerCase().includes(kw) || m.desc.toLowerCase().includes(kw));
        }
        // 排序
        if (currentSort === "date") {
            filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
        } else if (currentSort === "hot") {
            filtered.sort((a,b) => b.hot - a.hot);
        }
        return filtered;
    }

    function renderMaterials() {
        let filtered = getFilteredAndSearched();
        const showItems = filtered.slice(0, visibleCount);
        const grid = document.getElementById("materialGrid");
        if (showItems.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px;">没有找到相关素材，换个关键词试试～</div>`;
            document.getElementById("loadMoreBtn").style.display = "none";
            return;
        }
        grid.innerHTML = showItems.map(m => `
            <div class="card">
                <div class="card-preview">
                    <span>${m.previewIcon}</span>
                    <span class="card-badge">${m.quality === "8k" ? "8K" : (m.quality === "4k" ? "4K" : "HD")}</span>
                </div>
                <div class="card-content">
                    <div class="card-title">${m.title}</div>
                    <div class="card-desc">${m.desc}</div>
                    <div class="card-meta">
                        <span>📦 ${m.size}</span>
                        <span>🔥 ${m.hot}</span>
                    </div>
                    <div class="card-footer">
                        <span class="tag">${m.priceType === "free" ? "免费" : "Pro专享"}</span>
                        <a href="${m.officialUrl}" target="_blank" class="download-link">获取 →</a>
                    </div>
                </div>
            </div>
        `).join("");
        // 控制加载更多按钮显示
        const loadBtnDiv = document.getElementById("loadMoreBtn");
        if (visibleCount >= filtered.length) {
            loadBtnDiv.style.display = "none";
        } else {
            loadBtnDiv.style.display = "block";
        }
    }

    // 加载更多
    document.getElementById("loadMoreBtn").querySelector("button").addEventListener("click", () => {
        visibleCount += 12;
        renderMaterials();
    });

    // 筛选器事件
    document.querySelectorAll(".filter-chip").forEach(chip => {
        chip.addEventListener("click", () => {
            document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
            chip.classList.add("active");
            currentFilter = chip.dataset.filter;
            visibleCount = 12;
            renderMaterials();
        });
    });

    document.getElementById("sortDate").addEventListener("click", () => {
        currentSort = "date";
        visibleCount = 12;
        renderMaterials();
    });
    document.getElementById("sortHot").addEventListener("click", () => {
        currentSort = "hot";
        visibleCount = 12;
        renderMaterials();
    });

    document.getElementById("searchBtn").addEventListener("click", () => {
        currentSearch = document.getElementById("searchInput").value;
        visibleCount = 12;
        renderMaterials();
    });
    document.getElementById("searchInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            currentSearch = e.target.value;
            visibleCount = 12;
            renderMaterials();
        }
    });

    renderCategories();
    renderMaterials();
</script>
</body>
</html>
