<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源分享站 | 灵感仓库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== 影视飓风风格深色主题 ========== */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #121218;
            --bg-card: #1a1a24;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent-cyan: #00d4ff;
            --accent-purple: #7b2cbf;
            --gradient-glow: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%);
            --border-glow: rgba(0, 212, 255, 0.2);
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 动态光晕背景 */
        .glow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.08) 0%, rgba(0, 0, 0, 0) 50%),
                        radial-gradient(circle at 80% 70%, rgba(123, 44, 191, 0.08) 0%, rgba(0, 0, 0, 0) 50%);
        }

        /* ========== 导航栏 ========== */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 48px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--gradient-glow);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }

        .logo span {
            font-size: 1rem;
            background: none;
            -webkit-background-clip: unset;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .nav-links {
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: var(--accent-cyan);
        }

        /* ========== 英雄区 ========== */
        .hero {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 24px 80px;
        }

        .hero-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 40px;
            font-size: 0.85rem;
            color: var(--accent-cyan);
            margin-bottom: 24px;
            backdrop-filter: blur(4px);
        }

        .hero h1 {
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent-cyan) 50%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 24px;
            letter-spacing: -2px;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin-bottom: 40px;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 32px;
            background: var(--gradient-glow);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        /* ========== 统计卡片 ========== */
        .stats {
            display: flex;
            justify-content: center;
            gap: 60px;
            padding: 40px 24px;
            flex-wrap: wrap;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--gradient-glow);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ========== 资源分类标签 ========== */
        .categories {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin: 48px 24px 32px;
        }

        .category {
            padding: 8px 24px;
            background: var(--bg-card);
            border-radius: 40px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .category:hover, .category.active {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        /* ========== 资源卡片网格 ========== */
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .resource-card {
            background: var(--bg-card);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .resource-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-cyan);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card-preview {
            height: 180px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .card-preview::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .resource-card:hover .card-preview::after {
            left: 100%;
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-desc {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .download-btn {
            padding: 6px 16px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 20px;
            color: var(--accent-cyan);
            text-decoration: none;
            font-size: 0.75rem;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: var(--accent-cyan);
            color: var(--bg-primary);
        }

        /* ========== 页脚 ========== */
        footer {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-secondary);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 48px;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .navbar {
                padding: 16px 24px;
                flex-direction: column;
                gap: 16px;
            }
            .hero h1 {
                font-size: 2.5rem;
            }
            .stats {
                gap: 30px;
            }
            .resource-grid {
                grid-template-columns: 1fr;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
<div class="glow-bg"></div>

<nav class="navbar">
    <div class="logo">灵感仓库<span> .resource</span></div>
    <div class="nav-links">
        <a href="#">首页</a>
        <a href="#resources">资源库</a>
        <a href="#about">关于</a>
    </div>
</nav>

<section class="hero">
    <div class="hero-badge">✦ 灵感永不枯竭 ✦</div>
    <h1>创意资源<br>无限可能</h1>
    <p>汇聚高品质设计素材、开发工具与创意灵感，为创作者打造的一站式资源分享平台</p>
    <a href="#resources" class="cta-button">
        🚀 探索资源库
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
    </a>
</section>

<div class="stats">
    <div class="stat-item">
        <div class="stat-number">500+</div>
        <div class="stat-label">精选资源</div>
    </div>
    <div class="stat-item">
        <div class="stat-number">128</div>
        <div class="stat-label">创作者</div>
    </div>
    <div class="stat-item">
        <div class="stat-number">10k+</div>
        <div class="stat-label">下载次数</div>
    </div>
</div>

<div class="categories" id="categories">
    <span class="category active" data-cat="all">全部</span>
    <span class="category" data-cat="ui">UI设计</span>
    <span class="category" data-cat="dev">开发工具</span>
    <span class="category" data-cat="video">影视素材</span>
    <span class="category" data-cat="audio">音频资源</span>
</div>

<div class="resource-grid" id="resourceGrid">
    <!-- 资源卡片会通过JS动态加载 -->
</div>

<footer>
    <p>© 2026 灵感仓库 · 所有资源版权归原作者所有</p>
    <p style="font-size: 0.75rem; margin-top: 12px;">✨ 持续更新中，欢迎常来看看 ✨</p>
</footer>

<script>
    // 资源数据（你可以随时修改或添加）
    const resources = [
        {
            title: "Neon UI Kit",
            desc: "赛博朋克风格UI组件库，包含50+组件",
            icon: "🎨",
            category: "ui",
            size: "24MB",
            download: "#"
        },
        {
            title: "CodeEditor Pro",
            desc: "轻量级网页代码编辑器，支持语法高亮",
            icon: "💻",
            category: "dev",
            size: "1.2MB",
            download: "#"
        },
        {
            title: "Cinematic LUTs",
            desc: "电影级调色预设，适配达芬奇/PR",
            icon: "🎬",
            category: "video",
            size: "156MB",
            download: "#"
        },
        {
            title: "Lo-fi Sample Pack",
            desc: "Lo-fi Hip Hop 采样包，120个高质量WAV",
            icon: "🎧",
            category: "audio",
            size: "890MB",
            download: "#"
        },
        {
            title: "3D Icon Set",
            desc: "200+ 3D立体图标，适配Figma/Blender",
            icon: "📦",
            category: "ui",
            size: "45MB",
            download: "#"
        },
        {
            title: "VSCode Theme",
            desc: "影视飓风风格VSCode主题，暗色护眼",
            icon: "🎨",
            category: "dev",
            size: "0.5MB",
            download: "#"
        },
        {
            title: "Transition Pack",
            desc: "PR/AE转场预设，60种动态转场",
            icon: "✨",
            category: "video",
            size: "28MB",
            download: "#"
        },
        {
            title: "Ambient Sound Pack",
            desc: "环境音效素材，适合视频配乐",
            icon: "🌊",
            category: "audio",
            size: "234MB",
            download: "#"
        },
        {
            title: "Glassmorphism UI",
            desc: "毛玻璃效果UI组件，Figma源文件",
            icon: "🪟",
            category: "ui",
            size: "12MB",
            download: "#"
        }
    ];

    let currentCategory = "all";

    function renderResources() {
        const grid = document.getElementById("resourceGrid");
        const filtered = currentCategory === "all" 
            ? resources 
            : resources.filter(r => r.category === currentCategory);
        
        grid.innerHTML = filtered.map(res => `
            <div class="resource-card">
                <div class="card-preview">${res.icon}</div>
                <div class="card-content">
                    <div class="card-title">${res.title}</div>
                    <div class="card-desc">${res.desc}</div>
                    <div class="card-meta">
                        <span>📦 ${res.size}</span>
                        <a href="${res.download}" class="download-btn">下载资源 →</a>
                    </div>
                </div>
            </div>
        `).join("");
    }

    // 分类切换
    document.querySelectorAll(".category").forEach(cat => {
        cat.addEventListener("click", () => {
            document.querySelectorAll(".category").forEach(c => c.classList.remove("active"));
            cat.classList.add("active");
            currentCategory = cat.dataset.cat;
            renderResources();
        });
    });

    renderResources();
</script>
</body>
</html>
