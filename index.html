<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>灵感工坊 · 软件与创意资源</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1a2c3e;
        }

        .navbar {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.05);
            padding: 12px 28px;
            z-index: 100;
        }

        .nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #07C160 0%, #059e4a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #2c3e4e;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .nav-links a:hover { color: #07C160; }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: #07C160;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .hero {
            background: linear-gradient(135deg, #e8f5e9 0%, #d4e8d4 100%);
            padding: 60px 28px;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.8rem;
            margin-bottom: 16px;
        }

        .hero p {
            color: #4a5b6e;
            max-width: 600px;
            margin: 0 auto;
        }

        .section-title {
            max-width: 1400px;
            margin: 48px auto 24px;
            padding: 0 28px;
            font-size: 1.6rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .grid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 28px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 0.5px solid #e9edf2;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12);
        }

        .card-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .card h3 { font-size: 1.1rem; margin-bottom: 6px; }
        .card-desc { font-size: 0.75rem; color: #7e8c9e; margin-bottom: 16px; line-height: 1.4; }
        .card-meta { display: flex; justify-content: space-between; align-items: center; }
        .tag {
            background: #eef2f5;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
        }
        .download-btn {
            background: #07C160;
            border-radius: 40px;
            padding: 8px 18px;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
        }

        footer {
            text-align: center;
            padding: 40px 24px;
            color: #8a99b0;
            font-size: 0.75rem;
            border-top: 0.5px solid #e2e8f0;
            margin-top: 48px;
        }

        @media (max-width: 680px) {
            .navbar { padding: 12px 16px; }
            .hero h1 { font-size: 1.8rem; }
            .section-title { font-size: 1.3rem; }
            .grid { padding: 0 16px; gap: 16px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-inner">
        <div class="logo">🎨 灵感工坊</div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="material.html">素材库</a>
            <a href="privacy.html">隐私政策</a>
            <div id="userSection">
                <a href="login.html" id="loginLink">登录/注册</a>
            </div>
        </div>
    </div>
</nav>

<section class="hero">
    <h1>✨ 设计与创意资源集合</h1>
    <p>精选官方软件下载 · 影视级素材库 · 开源创作工具</p>
</section>

<div class="section-title">
    <span>📦 热门软件 · 官方下载</span>
    <span style="font-size: 0.8rem;">点击即跳转官网</span>
</div>

<div class="grid" id="softwareGrid"></div>

<div class="section-title">
    <span>🎬 推荐素材 · 本周热门</span>
    <a href="material.html" style="font-size: 0.8rem; color: #07C160;">查看全部 →</a>
</div>

<div class="grid" id="materialGrid"></div>

<footer>
    <p>© 2026 灵感工坊 · 所有下载均跳转至官方网站，安全可靠</p>
    <p style="margin-top: 8px;"><a href="privacy.html" style="color: #07C160;">隐私政策</a> | 数据仅存储于本地浏览器</p>
</footer>

<script>
    // ---------- 软件数据（官方下载链接）----------
    const softwares = [
        { name: "Visual Studio Code", desc: "轻量级代码编辑器，插件丰富", icon: "💻", officialUrl: "https://code.visualstudio.com/Download" },
        { name: "DaVinci Resolve", desc: "专业调色剪辑，免费版功能强大", icon: "🎬", officialUrl: "https://www.blackmagicdesign.com/products/davinciresolve" },
        { name: "OBS Studio", desc: "开源直播录制软件", icon: "📹", officialUrl: "https://obsproject.com/download" },
        { name: "Blender", desc: "开源3D创作套件", icon: "🌀", officialUrl: "https://www.blender.org/download/" },
        { name: "GIMP", desc: "免费图像编辑，PS替代", icon: "🖌️", officialUrl: "https://www.gimp.org/downloads/" },
        { name: "7-Zip", desc: "高压缩率解压工具", icon: "🗜️", officialUrl: "https://www.7-zip.org/download.html" },
        { name: "Figma", desc: "在线UI设计协作工具", icon: "🎨", officialUrl: "https://www.figma.com/downloads/" },
        { name: "Audacity", desc: "开源音频编辑软件", icon: "🎧", officialUrl: "https://www.audacityteam.org/download/" }
    ];

    // 素材数据
    const materials = [
        { title: "鱼-05 4K", desc: "水下鱼类特写，高动态", icon: "🐟", category: "视频", officialUrl: "https://www.ysjf.com/material/1" },
        { title: "自然景观-02 4K", desc: "山巅云海延时", icon: "🏔️", category: "视频", officialUrl: "https://www.ysjf.com/material/2" },
        { title: "黑水摄影特写", desc: "深海奇异生物", icon: "🦑", category: "视频", officialUrl: "https://www.ysjf.com/material/3" },
        { title: "4D高斯·云冈石窟", desc: "高斯泼溅重建", icon: "🏛️", category: "3D", officialUrl: "https://www.ysjf.com/material/6" },
        { title: "梦境生成Skill", desc: "AI工作流模型", icon: "🧠", category: "AI工具", officialUrl: "https://www.ysjf.com/material/5" },
        { title: "环境音效包-城市", desc: "街道人群氛围", icon: "🏙️", category: "音效", officialUrl: "https://www.ysjf.com/material/14" }
    ];

    function renderSoftware() {
        const grid = document.getElementById("softwareGrid");
        grid.innerHTML = softwares.map(s => `
            <div class="card">
                <div class="card-icon">${s.icon}</div>
                <h3>${s.name}</h3>
                <div class="card-desc">${s.desc}</div>
                <div class="card-meta">
                    <span class="tag">官方正版</span>
                    <a href="${s.officialUrl}" target="_blank" class="download-btn">官网下载 →</a>
                </div>
            </div>
        `).join("");
    }

    function renderMaterials() {
        const grid = document.getElementById("materialGrid");
        grid.innerHTML = materials.slice(0, 6).map(m => `
            <div class="card">
                <div class="card-icon">${m.icon}</div>
                <h3>${m.title}</h3>
                <div class="card-desc">${m.desc}</div>
                <div class="card-meta">
                    <span class="tag">${m.category}</span>
                    <a href="${m.officialUrl}" target="_blank" class="download-btn">获取 →</a>
                </div>
            </div>
        `).join("");
    }

    // 检查登录状态，显示用户头像或登录链接
    function checkLoginStatus() {
        const user = localStorage.getItem("currentUser");
        const userSection = document.getElementById("userSection");
        if (user) {
            const userData = JSON.parse(user);
            const userName = userData.username || "用户";
            const initial = userName.charAt(0).toUpperCase();
            userSection.innerHTML = `<div class="user-avatar" onclick="location.href='profile.html'">${initial}</div>`;
        } else {
            userSection.innerHTML = `<a href="login.html" id="loginLink">登录/注册</a>`;
        }
    }

    renderSoftware();
    renderMaterials();
    checkLoginStatus();
</script>
</body>
</html>
