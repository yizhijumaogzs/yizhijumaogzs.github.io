<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1a2c3e;
        }

        .navbar {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.05);
            padding: 12px 28px;
            z-index: 100;
        }

        .nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #07C160 0%, #059e4a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #2c3e4e;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .nav-links a:hover { color: #07C160; }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: #07C160;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        /* 搜索栏 */
        .search-section {
            max-width: 1400px;
            margin: 32px auto 24px;
            padding: 0 28px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            background: white;
            border-radius: 60px;
            padding: 6px 6px 6px 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 0.5px solid #e2e8f0;
        }

        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1rem;
            background: transparent;
            padding: 14px 0;
        }

        .search-bar button {
            background: #07C160;
            border: none;
            border-radius: 50px;
            padding: 0 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        /* 分类标签 */
        .categories {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 28px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            border-bottom: 1px solid #e9edf2;
            padding-bottom: 16px;
        }

        .cat-btn {
            background: none;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #5e6f8d;
            cursor: pointer;
            transition: 0.2s;
        }

        .cat-btn.active {
            background: #07C160;
            color: white;
        }

        /* 素材网格 */
        .grid {
            max-width: 1400px;
            margin: 32px auto;
            padding: 0 28px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 0.5px solid #e9edf2;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12);
        }

        .card-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .card h3 { font-size: 1.1rem; margin-bottom: 6px; }
        .card-desc { font-size: 0.75rem; color: #7e8c9e; margin-bottom: 16px; line-height: 1.4; }
        .card-meta { display: flex; justify-content: space-between; align-items: center; }
        .tag {
            background: #eef2f5;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
        }
        .download-btn {
            background: #07C160;
            border-radius: 40px;
            padding: 8px 18px;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
        }

        .back-link {
            display: inline-block;
            margin: 20px 28px;
            color: #07C160;
            text-decoration: none;
        }

        footer {
            text-align: center;
            padding: 40px 24px;
            color: #8a99b0;
            font-size: 0.75rem;
            border-top: 0.5px solid #e2e8f0;
            margin-top: 20px;
        }

        @media (max-width: 680px) {
            .navbar { padding: 12px 16px; }
            .search-section, .categories, .grid { padding: 0 16px; }
            .grid { gap: 16px; }
        }
    </style>
</head>

    let currentCategory = "all";
    let currentSearch = "";

    function renderMaterials() {
        let filtered = allMaterials;
        if (currentCategory !== "all") {
            filtered = filtered.filter(m => m.category === currentCategory);
        }
        if (currentSearch.trim() !== "") {
            const kw = currentSearch.toLowerCase();
            filtered = filtered.filter(m => m.title.toLowerCase().includes(kw) || m.desc.toLowerCase().includes(kw));
        }
        
        const grid = document.getElementById("materialGrid");
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px;">没有找到相关素材</div>';
            return;
        }
        
        // 分类名称映射
        const catName = {
            'nav': '导航站', 'video': '影视', 'image': '图库', 
            'book': '电子书', 'pan': '网盘', 'tool': '工具', 
            'audio': '音效', 'ai': 'AI工具'
        };
        
        grid.innerHTML = filtered.map(m => `
            <div class="card">
                <div class="card-icon">${m.icon}</div>
                <h3>${m.title}</h3>
                <div class="card-desc">${m.desc}</div>
                <div class="card-meta">
                    <span class="tag">${catName[m.category] || m.category}</span>
                    <a href="${m.officialUrl}" target="_blank" rel="noopener noreferrer" class="download-btn">访问 →</a>
                </div>
            </div>
        `).join("");
    }

    // 分类切换
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.cat;
            renderMaterials();
        });
    });

    // 搜索
    document.getElementById('searchBtn').addEventListener('click', () => {
        currentSearch = document.getElementById('searchInput').value;
        renderMaterials();
    });
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            currentSearch = e.target.value;
            renderMaterials();
        }
    });

    renderMaterials();
</script>
