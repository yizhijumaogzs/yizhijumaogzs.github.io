<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 · 灵感工坊</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6d9 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 0.5px solid rgba(255,255,255,0.5);
        }
        h1 { text-align: center; margin-bottom: 24px; color: #1a2c3e; }
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            cursor: pointer;
            font-weight: 500;
            color: #8a99b0;
        }
        .tab.active {
            color: #07C160;
            border-bottom: 2px solid #07C160;
        }
        .form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        input {
            padding: 14px 18px;
            border-radius: 44px;
            border: 1px solid #dce3e9;
            font-size: 1rem;
            background: #f8fafc;
        }
        button {
            background: #07C160;
            border: none;
            padding: 14px;
            border-radius: 44px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }
        .error {
            color: #e53e3e;
            font-size: 0.8rem;
            text-align: center;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #07C160;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🎨 灵感工坊</h1>
    <div class="tabs">
        <div class="tab active" data-tab="login">登录</div>
        <div class="tab" data-tab="register">注册</div>
    </div>

    <div id="loginForm" class="form">
        <input type="text" id="loginUsername" placeholder="用户名">
        <input type="password" id="loginPassword" placeholder="密码">
        <button onclick="doLogin()">登录</button>
        <div id="loginError" class="error"></div>
    </div>

    <div id="registerForm" class="form" style="display: none;">
        <input type="text" id="regUsername" placeholder="用户名">
        <input type="password" id="regPassword" placeholder="密码">
        <input type="password" id="regConfirm" placeholder="确认密码">
        <button onclick="doRegister()">注册</button>
        <div id="regError" class="error"></div>
    </div>

    <div class="back-link">
        <a href="index.html">← 返回首页</a>
    </div>
</div>

<script>
    // 切换登录/注册
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const isLogin = tab.dataset.tab === 'login';
            document.getElementById('loginForm').style.display = isLogin ? 'flex' : 'none';
            document.getElementById('registerForm').style.display = isLogin ? 'none' : 'flex';
        });
    });

    function doLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
            localStorage.setItem('currentUser', JSON.stringify({ username: user.username }));
            window.location.href = 'index.html';
        } else {
            document.getElementById('loginError').innerText = '用户名或密码错误';
        }
    }

    function doRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        if (!username || !password) {
            document.getElementById('regError').innerText = '请填写完整';
            return;
        }
        if (password !== confirm) {
            document.getElementById('regError').innerText = '两次密码不一致';
            return;
        }
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        if (users.find(u => u.username === username)) {
            document.getElementById('regError').innerText = '用户名已存在';
            return;
        }
        users.push({ username, password });
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('currentUser', JSON.stringify({ username }));
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
