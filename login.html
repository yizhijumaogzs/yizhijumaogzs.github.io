<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 · 灵感工坊</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6d9 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 0.5px solid rgba(255,255,255,0.5);
        }
        h1 { text-align: center; margin-bottom: 24px; color: #1a2c3e; }
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            cursor: pointer;
            font-weight: 500;
            color: #8a99b0;
        }
        .tab.active {
            color: #07C160;
            border-bottom: 2px solid #07C160;
        }
        .form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        input {
            padding: 14px 18px;
            border-radius: 44px;
            border: 1px solid #dce3e9;
            font-size: 1rem;
            background: #f8fafc;
        }
        button {
            background: #07C160;
            border: none;
            padding: 14px;
            border-radius: 44px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }
        .error {
            color: #e53e3e;
            font-size: 0.8rem;
            text-align: center;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #07C160;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🎨 灵感工坊</h1>
    <div class="tabs">
        <div class="tab active" data-tab="login">登录</div>
        <div class="tab" data-tab="register">注册</div>
    </div>

    <div id="loginForm" class="form">
        <input type="text" id="loginUsername" placeholder="用户名">
        <input type="password" id="loginPassword" placeholder="密码">
        <button onclick="doLogin()">登录</button>
        <div id="loginError" class="error"></div>
    </div>

    <div id="registerForm" class="form" style="display: none;">
        <input type="text" id="regUsername" placeholder="用户名">
        <input type="password" id="regPassword" placeholder="密码">
        <input type="password" id="regConfirm" placeholder="确认密码">
        <button onclick="doRegister()">注册</button>
        <div id="regError" class="error"></div>
    </div>

    <div class="back-link">
        <a href="index.html">← 返回首页</a>
    </div>
</div>

<script>
    // ========== 管理员预设账号 ==========
    const ADMIN_USERNAME = "一只橘猫工作室";
    const ADMIN_PASSWORD = "aaaa";

    // 获取 GitHub Token（用于保存登录日志）
    let githubToken = localStorage.getItem('gh_token');
    if (!githubToken) {
        // 如果还没有 Token，提示用户输入（管理员需要配置）
        const token = prompt('🔐 首次使用，请输入 GitHub Token（用于记录登录日志）\n获取地址: https://github.com/settings/tokens\n勾选 repo 权限即可\n\n如果不填，登录记录将不会被保存');
        if (token) {
            githubToken = token;
            localStorage.setItem('gh_token', githubToken);
        }
    }

    // 初始化：如果还没有管理员账号，自动注册到系统
    function initAdminAccount() {
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        const adminExists = users.find(u => u.username === ADMIN_USERNAME);
        if (!adminExists) {
            users.push({
                username: ADMIN_USERNAME,
                password: ADMIN_PASSWORD,
                isAdmin: true,
                registerTime: new Date().toISOString()
            });
            localStorage.setItem('users', JSON.stringify(users));
        }
    }

    // ========== 获取客户端信息 ==========
    async function getClientInfo() {
        try {
            // 获取 IP 和地理位置
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();
            
            // 获取浏览器信息
            const ua = navigator.userAgent;
            let browser = '未知';
            let os = '未知';
            
            if (ua.includes('Chrome') && !ua.includes('Edg')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
            else if (ua.includes('Edg')) browser = 'Edge';
            else if (ua.includes('MSIE') || ua.includes('Trident')) browser = 'IE';
            
            if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac')) os = 'macOS';
            else if (ua.includes('Linux')) os = 'Linux';
            else if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';
            
            return {
                ip: ipData.ip || '未知',
                location: `${ipData.city || ''} ${ipData.region || ''} ${ipData.country_name || ''}`.trim() || '未知',
                browser: browser,
                os: os,
                userAgent: ua.substring(0, 200)
            };
        } catch(e) {
            return {
                ip: '未知',
                location: '未知',
                browser: '未知',
                os: '未知',
                userAgent: navigator.userAgent.substring(0, 200)
            };
        }
    }

    // ========== 记录登录日志到 GitHub ==========
    async function recordLoginLog(username, isAdmin) {
        if (!githubToken) return;
        
        try {
            const clientInfo = await getClientInfo();
            const logRecord = {
                id: Date.now(),
                username: username,
                isAdmin: isAdmin,
                timestamp: new Date().toISOString(),
                ip: clientInfo.ip,
                location: clientInfo.location,
                browser: clientInfo.browser,
                os: clientInfo.os,
                userAgent: clientInfo.userAgent
            };
            
            // 读取现有登录日志
            let logs = [];
            try {
                const res = await fetch(`https://api.github.com/repos/yizhijumaogzs/yizhijumaogzs.github.io/contents/data/login_logs.json`, {
                    headers: { 'Authorization': `token ${githubToken}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    logs = JSON.parse(atob(data.content));
                }
            } catch(e) {}
            
            logs.unshift(logRecord);
            if (logs.length > 500) logs = logs.slice(0, 500);
            
            // 保存
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(logs, null, 2))));
            const url = `https://api.github.com/repos/yizhijumaogzs/yizhijumaogzs.github.io/contents/data/login_logs.json`;
            let sha = null;
            try {
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${githubToken}` } });
                if (getRes.ok) sha = (await getRes.json()).sha;
            } catch(e) {}
            
            await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify({ message: `登录记录: ${username}`, content, sha, branch: 'main' })
            });
        } catch(e) {
            console.error('记录登录日志失败:', e);
        }
    }

    // ========== 记录访问日志 ==========
    async function recordVisitLog(page, username = 'anonymous') {
        if (!githubToken) return;
        
        try {
            const clientInfo = await getClientInfo();
            const visitRecord = {
                id: Date.now(),
                page: page,
                userId: username,
                timestamp: new Date().toISOString(),
                ip: clientInfo.ip,
                location: clientInfo.location,
                browser: clientInfo.browser,
                os: clientInfo.os
            };
            
            let logs = [];
            try {
                const res = await fetch(`https://api.github.com/repos/yizhijumaogzs/yizhijumaogzs.github.io/contents/data/visits.json`, {
                    headers: { 'Authorization': `token ${githubToken}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    logs = JSON.parse(atob(data.content));
                }
            } catch(e) {}
            
            logs.unshift(visitRecord);
            if (logs.length > 500) logs = logs.slice(0, 500);
            
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(logs, null, 2))));
            const url = `https://api.github.com/repos/yizhijumaogzs/yizhijumaogzs.github.io/contents/data/visits.json`;
            let sha = null;
            try {
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${githubToken}` } });
                if (getRes.ok) sha = (await getRes.json()).sha;
            } catch(e) {}
            
            await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify({ message: `访问记录: ${page}`, content, sha, branch: 'main' })
            });
        } catch(e) {
            console.error('记录访问失败:', e);
        }
    }

    // 切换登录/注册
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const isLogin = tab.dataset.tab === 'login';
            document.getElementById('loginForm').style.display = isLogin ? 'flex' : 'none';
            document.getElementById('registerForm').style.display = isLogin ? 'none' : 'flex';
        });
    });

    // ========== 登录函数 ==========
    async function doLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const user = users.find(u => u.username === username && u.password === password);
        
        if (user) {
            // 记录登录日志
            await recordLoginLog(username, user.isAdmin || false);
            
            // 保存当前登录用户
            localStorage.setItem('currentUser', JSON.stringify({
                username: user.username,
                isAdmin: user.isAdmin || false
            }));
            
            // 跳转
            if (user.isAdmin === true) {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'index.html';
            }
        } else {
            document.getElementById('loginError').innerText = '用户名或密码错误';
        }
    }

    // ========== 注册函数 ==========
    async function doRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        
        if (!username || !password) {
            document.getElementById('regError').innerText = '请填写完整';
            return;
        }
        
        if (username === ADMIN_USERNAME) {
            document.getElementById('regError').innerText = '该用户名不可注册';
            return;
        }
        
        if (password !== confirm) {
            document.getElementById('regError').innerText = '两次密码不一致';
            return;
        }
        
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        if (users.find(u => u.username === username)) {
            document.getElementById('regError').innerText = '用户名已存在';
            return;
        }
        
        // 新用户注册
        const newUser = {
            username: username,
            password: password,
            isAdmin: false,
            registerTime: new Date().toISOString()
        };
        users.push(newUser);
        localStorage.setItem('users', JSON.stringify(users));
        
        // 注册后自动登录
        localStorage.setItem('currentUser', JSON.stringify({
            username: username,
            isAdmin: false
        }));
        
        // 记录登录日志（注册后自动登录）
        await recordLoginLog(username, false);
        
        // 跳转首页
        window.location.href = 'index.html';
    }

    // 记录页面访问（登录页面本身）
    recordVisitLog('login.html');

    // 初始化管理员账号
    initAdminAccount();
</script>
</body>
</html>
