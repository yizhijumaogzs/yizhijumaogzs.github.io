<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 · 灵感工坊</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 24px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-green {
            background: #07C160;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .full-width { grid-column: span 2; }
        label { font-weight: 500; font-size: 0.8rem; color: #2c3e4e; }
        input, select, textarea {
            padding: 10px 14px;
            border-radius: 24px;
            border: 1px solid #dce3e9;
            background: white;
        }
        .material-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .actions button {
            background: none;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
        }
        .logout-btn {
            background: #e53e3e;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            opacity: 0;
            transition: 0.2s;
            z-index: 1000;
        }
        .info-box {
            background: #e8f5e9;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            border-left: 4px solid #07C160;
        }
        .info-box a {
            color: #07C160;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>👑 管理员后台 · 素材管理</h2>
        <div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <!-- 提示信息 -->
    <div class="info-box">
        📁 <strong>如何上传文件？</strong><br>
        1. 在 GitHub 仓库的 <code>uploads</code> 文件夹手动上传文件：<br>
        👉 <a href="https://github.com/yizhijumaogzs/yizhijumaogzs.github.io/tree/main/uploads" target="_blank">点击这里打开 uploads 文件夹</a><br>
        2. 上传后，复制文件链接，粘贴到下面的「下载链接」输入框<br>
        3. 链接格式：<code>https://yizhijumaogzs.github.io/uploads/你的文件名</code>
    </div>

    <div class="card">
        <h3>➕ 添加/编辑素材</h3>
        <div class="form-grid">
            <div class="field"><label>标题 *</label><input type="text" id="title" placeholder="例：Blender 4.0"></div>
            <div class="field"><label>分类</label><select id="category">
                <option value="software">软件工具</option>
                <option value="video">视频素材</option>
                <option value="3d">3D资产</option>
                <option value="audio">音频音效</option>
                <option value="other">其他</option>
            </select></div>
            <div class="field full-width"><label>描述</label><textarea id="desc" rows="2" placeholder="素材简介..."></textarea></div>
            <div class="field"><label>图标(emoji)</label><input type="text" id="icon" value="📦"></div>
            <div class="field"><label>文件大小</label><input type="text" id="size" placeholder="2.3GB"></div>
            <div class="field"><label>热度</label><input type="number" id="hot" value="100"></div>
            <div class="field full-width"><label>🔗 下载链接 *</label><input type="url" id="officialUrl" placeholder="https://yizhijumaogzs.github.io/uploads/你的文件名"></div>
        </div>
        <button id="addMaterialBtn" class="btn-green">+ 添加素材</button>
    </div>

    <div class="card">
        <h3>📋 当前素材列表</h3>
        <div id="materialListContainer">加载中...</div>
        <button id="saveMaterialsBtn" class="btn-green" style="margin-top: 20px;">💾 保存到 GitHub</button>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
    // ========== 权限验证 ==========
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
    if (!currentUser.isAdmin) {
        alert('您没有权限访问管理员页面');
        window.location.href = 'index.html';
    }

    let materials = [];
    const REPO = 'yizhijumaogzs/yizhijumaogzs.github.io';

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2500);
    }

    // 加载素材列表
    async function loadMaterials() {
        try {
            const url = `https://raw.githubusercontent.com/${REPO}/main/materials.json`;
            const res = await fetch(url + '?_=' + Date.now());
            if (!res.ok) throw new Error();
            materials = await res.json();
            renderMaterialList();
        } catch(e) {
            materials = [];
            renderMaterialList();
        }
    }

    function renderMaterialList() {
        const container = document.getElementById('materialListContainer');
        if (!materials.length) {
            container.innerHTML = '<div style="color: #8a99b0; text-align: center; padding: 20px;">暂无素材，请添加</div>';
            return;
        }
        container.innerHTML = materials.map((m, idx) => `
            <div class="material-item">
                <div><strong>${m.icon} ${m.title}</strong><br><small>${m.category} · ${m.size} · 🔥${m.hot}</small><br><small style="color:#07C160;">${m.officialUrl?.substring(0, 60)}...</small></div>
                <div class="actions">
                    <button class="edit-material" data-idx="${idx}">✏️ 编辑</button>
                    <button class="del-material" data-idx="${idx}">🗑️ 删除</button>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.edit-material').forEach(btn => {
            btn.addEventListener('click', () => editMaterial(parseInt(btn.dataset.idx)));
        });
        document.querySelectorAll('.del-material').forEach(btn => {
            btn.addEventListener('click', () => { materials.splice(parseInt(btn.dataset.idx),1); renderMaterialList(); });
        });
    }

    function editMaterial(idx) {
        const m = materials[idx];
        document.getElementById('title').value = m.title;
        document.getElementById('category').value = m.category;
        document.getElementById('desc').value = m.desc;
        document.getElementById('icon').value = m.icon;
        document.getElementById('size').value = m.size;
        document.getElementById('hot').value = m.hot;
        document.getElementById('officialUrl').value = m.officialUrl;
        materials.splice(idx,1);
        renderMaterialList();
        showToast('已载入编辑区，修改后点击“添加素材”');
    }

    document.getElementById('addMaterialBtn').addEventListener('click', () => {
        const newItem = {
            id: Date.now(),
            title: document.getElementById('title').value,
            category: document.getElementById('category').value,
            desc: document.getElementById('desc').value,
            icon: document.getElementById('icon').value,
            size: document.getElementById('size').value,
            hot: parseInt(document.getElementById('hot').value) || 0,
            officialUrl: document.getElementById('officialUrl').value,
            date: new Date().toISOString().slice(0,10)
        };
        if (!newItem.title || !newItem.officialUrl) {
            showToast('标题和下载链接不能为空', true);
            return;
        }
        materials.push(newItem);
        renderMaterialList();
        document.getElementById('title').value = '';
        document.getElementById('desc').value = '';
        document.getElementById('officialUrl').value = '';
        document.getElementById('size').value = '';
        showToast('已添加素材，记得点击“保存到 GitHub”');
    });

    // 保存素材到 GitHub
    async function saveMaterials() {
        let token = localStorage.getItem('gh_token');
        if (!token) {
            token = prompt('🔐 需要 GitHub Token（repo权限）才能保存\n获取地址：https://github.com/settings/tokens\n\n只勾选 repo 即可\n\n粘贴你的 Token：');
            if (token) localStorage.setItem('gh_token', token);
            else return;
        }
        
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(materials, null, 2))));
        const url = `https://api.github.com/repos/${REPO}/contents/materials.json`;
        let sha = null;
        try {
            const get = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            if (get.ok) sha = (await get.json()).sha;
        } catch(e) {}
        
        const res = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
            body: JSON.stringify({ message: 'Update materials', content, sha, branch: 'main' })
        });
        if (res.ok) showToast('✅ 素材数据已保存');
        else showToast('❌ 保存失败，Token 可能无效', true);
    }

    document.getElementById('saveMaterialsBtn').addEventListener('click', saveMaterials);

    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = 'index.html';
    }

    loadMaterials();
</script>
</body>
</html>
