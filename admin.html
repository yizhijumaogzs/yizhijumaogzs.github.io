<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 · 灵感工坊</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 24px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-green {
            background: #07C160;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-blue {
            background: #3b82f6;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .full-width { grid-column: span 2; }
        label { font-weight: 500; font-size: 0.8rem; color: #2c3e4e; }
        input, select, textarea {
            padding: 10px 14px;
            border-radius: 24px;
            border: 1px solid #dce3e9;
            background: white;
        }
        .upload-area {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            margin-bottom: 24px;
            transition: 0.2s;
            cursor: pointer;
        }
        .upload-area.drag-over {
            border-color: #07C160;
            background: #e8f5e9;
        }
        .file-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 10px;
        }
        .file-link {
            color: #07C160;
            text-decoration: none;
            font-size: 0.8rem;
            word-break: break-all;
        }
        .material-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .actions button {
            background: none;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
        }
        .logout-btn {
            background: #e53e3e;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            opacity: 0;
            transition: 0.2s;
            z-index: 1000;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-top: 12px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #07C160;
            transition: width 0.3s;
        }
        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .tab-btn.active {
            background: #07C160;
            color: white;
        }
        .success-box {
            background: #e8f5e9;
            border-radius: 20px;
            padding: 12px;
            margin-top: 12px;
            font-size: 0.8rem;
            word-break: break-all;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>👑 管理员后台 · 文件与素材管理</h2>
        <div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="tab-buttons">
        <button class="tab-btn active" data-tab="upload">📤 文件上传</button>
        <button class="tab-btn" data-tab="materials">📋 素材管理</button>
    </div>

    <!-- 文件上传面板 -->
    <div id="uploadPanel" class="card">
        <h3>📁 上传文件</h3>
        <p style="color: #7e8c9e; font-size: 0.8rem; margin-bottom: 16px;">支持任意格式：图片、视频、压缩包、文档等（最大 25MB）</p>
        
        <div id="dropzone" class="upload-area">
            <div style="font-size: 3rem; margin-bottom: 8px;">📤</div>
            <div>拖拽文件到此处上传</div>
            <div style="margin: 12px 0;">或</div>
            <label class="btn-green" style="display: inline-block; padding: 10px 24px; cursor: pointer;">选择文件</label>
            <input type="file" id="fileInput" multiple style="display: none;">
            <div id="uploadProgress" class="progress-bar" style="display: none;">
                <div class="progress-fill"></div>
            </div>
        </div>

        <h3 style="margin: 20px 0 12px;">📂 已上传的文件（本次会话）</h3>
        <div id="fileListContainer" class="file-list">
            <div style="color: #8a99b0; text-align: center; padding: 20px;">上传文件后会显示在这里</div>
        </div>
        
        <div class="info-box" style="background: #eef2ff; border-radius: 16px; padding: 12px; margin-top: 16px;">
            💡 <strong>提示：</strong> 文件上传后，点击「复制链接」→ 切换到「素材管理」标签 → 粘贴到下载链接输入框
        </div>
    </div>

    <!-- 素材管理面板 -->
    <div id="materialsPanel" class="card" style="display: none;">
        <h3>➕ 添加/编辑素材</h3>
        <div class="form-grid">
            <div class="field"><label>标题</label><input type="text" id="title" placeholder="例：Blender 4.0"></div>
            <div class="field"><label>分类</label><select id="category">
                <option value="software">软件工具</option>
                <option value="video">视频素材</option>
                <option value="3d">3D资产</option>
                <option value="audio">音频音效</option>
                <option value="other">其他</option>
            </select></div>
            <div class="field full-width"><label>描述</label><textarea id="desc" rows="2" placeholder="素材简介..."></textarea></div>
            <div class="field"><label>图标(emoji)</label><input type="text" id="icon" value="📦"></div>
            <div class="field"><label>文件大小</label><input type="text" id="size" placeholder="2.3GB"></div>
            <div class="field"><label>热度</label><input type="number" id="hot" value="100"></div>
            <div class="field full-width"><label>下载链接</label><input type="url" id="officialUrl" placeholder="粘贴上面复制的文件链接"></div>
        </div>
        <button id="addMaterialBtn" class="btn-green">+ 添加素材</button>

        <h3 style="margin: 30px 0 12px;">📋 当前素材列表</h3>
        <div id="materialListContainer">加载中...</div>
        <button id="saveMaterialsBtn" class="btn-green" style="margin-top: 20px;">💾 保存素材数据</button>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
    // ========== 权限验证 ==========
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
    if (!currentUser.isAdmin) {
        alert('您没有权限访问管理员页面');
        window.location.href = 'index.html';
    }

    // ========== 使用 Catbox 免费上传服务（不需要 Token）==========
    let uploadedFiles = [];  // 存储本次上传的文件
    
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.background = isError ? '#e53e3e' : '#1e293b';
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 3000);
    }

    // 上传文件到 Catbox
    async function uploadToCatbox(file) {
        const formData = new FormData();
        formData.append('fileToUpload', file);
        formData.append('reqtype', 'fileupload');
        
        try {
            const response = await fetch('https://catbox.moe/user/api.php', {
                method: 'POST',
                body: formData
            });
            const url = await response.text();
            if (url.startsWith('http')) {
                return { success: true, url: url, name: file.name };
            } else {
                throw new Error('上传失败');
            }
        } catch(err) {
            // 备用方案：使用 imgbb（需要 API key，暂时用 catbox）
            return { success: false, error: err.message };
        }
    }

    // 处理文件上传
    async function handleFiles(files) {
        const progressBar = document.getElementById('uploadProgress');
        const progressFill = progressBar.querySelector('.progress-fill');
        progressBar.style.display = 'block';
        
        let completed = 0;
        const newFiles = [];
        
        for (const file of files) {
            showToast(`正在上传: ${file.name}...`);
            const result = await uploadToCatbox(file);
            
            if (result.success) {
                newFiles.push({
                    name: result.name,
                    url: result.url,
                    size: (file.size / (1024 * 1024)).toFixed(2) + ' MB',
                    time: new Date().toLocaleString()
                });
                showToast(`✅ ${result.name} 上传成功`);
            } else {
                showToast(`❌ ${file.name} 上传失败`, true);
            }
            
            completed++;
            progressFill.style.width = (completed / files.length * 100) + '%';
        }
        
        uploadedFiles = [...uploadedFiles, ...newFiles];
        renderFileList();
        
        setTimeout(() => { 
            progressBar.style.display = 'none'; 
            progressFill.style.width = '0%'; 
        }, 1000);
    }

    function renderFileList() {
        const container = document.getElementById('fileListContainer');
        if (uploadedFiles.length === 0) {
            container.innerHTML = '<div style="color: #8a99b0; text-align: center; padding: 20px;">上传文件后会显示在这里</div>';
            return;
        }
        container.innerHTML = uploadedFiles.map(f => `
            <div class="file-item">
                <div>
                    <strong>📄 ${f.name}</strong><br>
                    <small>${f.size} · ${f.time}</small>
                </div>
                <div style="display: flex; gap: 12px;">
                    <a href="${f.url}" target="_blank" class="file-link">🔗 查看</a>
                    <button class="copy-btn" data-url="${f.url}" style="background:#eef2f5; border:none; padding:4px 12px; border-radius:20px; cursor:pointer;">📋 复制链接</button>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                navigator.clipboard.writeText(btn.dataset.url);
                showToast('✅ 链接已复制，可粘贴到素材表单');
            });
        });
    }

    // 拖拽上传
    const dropzone = document.getElementById('dropzone');
    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('drag-over');
    });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
    dropzone.addEventListener('drop', async (e) => {
        e.preventDefault();
        dropzone.classList.remove('drag-over');
        const files = Array.from(e.dataTransfer.files);
        await handleFiles(files);
    });

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        await handleFiles(Array.from(e.target.files));
        e.target.value = '';
    });

    // ========== 素材管理 ==========
    let materials = [];
    const REPO = 'yizhijumaogzs/yizhijumaogzs.github.io';

    async function loadMaterials() {
        try {
            const url = `https://raw.githubusercontent.com/${REPO}/main/materials.json`;
            const res = await fetch(url + '?_=' + Date.now());
            if (!res.ok) throw new Error();
            materials = await res.json();
            renderMaterialList();
        } catch(e) {
            materials = [];
            renderMaterialList();
        }
    }

    function renderMaterialList() {
        const container = document.getElementById('materialListContainer');
        if (!materials.length) {
            container.innerHTML = '<div style="color: #8a99b0; text-align: center; padding: 20px;">暂无素材，请添加</div>';
            return;
        }
        container.innerHTML = materials.map((m, idx) => `
            <div class="material-item">
                <div><strong>${m.icon} ${m.title}</strong><br><small>${m.category} · ${m.size} · 🔥${m.hot}</small><br><small style="color:#07C160;">${m.officialUrl?.substring(0, 50)}...</small></div>
                <div class="actions">
                    <button class="edit-material" data-idx="${idx}">✏️ 编辑</button>
                    <button class="del-material" data-idx="${idx}">🗑️ 删除</button>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.edit-material').forEach(btn => {
            btn.addEventListener('click', () => editMaterial(parseInt(btn.dataset.idx)));
        });
        document.querySelectorAll('.del-material').forEach(btn => {
            btn.addEventListener('click', () => { materials.splice(parseInt(btn.dataset.idx),1); renderMaterialList(); });
        });
    }

    function editMaterial(idx) {
        const m = materials[idx];
        document.getElementById('title').value = m.title;
        document.getElementById('category').value = m.category;
        document.getElementById('desc').value = m.desc;
        document.getElementById('icon').value = m.icon;
        document.getElementById('size').value = m.size;
        document.getElementById('hot').value = m.hot;
        document.getElementById('officialUrl').value = m.officialUrl;
        materials.splice(idx,1);
        renderMaterialList();
        showToast('已载入编辑区，修改后点击“添加素材”');
    }

    document.getElementById('addMaterialBtn').addEventListener('click', () => {
        const newItem = {
            id: Date.now(),
            title: document.getElementById('title').value,
            category: document.getElementById('category').value,
            desc: document.getElementById('desc').value,
            icon: document.getElementById('icon').value,
            size: document.getElementById('size').value,
            hot: parseInt(document.getElementById('hot').value) || 0,
            officialUrl: document.getElementById('officialUrl').value,
            date: new Date().toISOString().slice(0,10)
        };
        if (!newItem.title || !newItem.officialUrl) {
            showToast('标题和下载链接不能为空', true);
            return;
        }
        materials.push(newItem);
        renderMaterialList();
        document.getElementById('title').value = '';
        document.getElementById('desc').value = '';
        document.getElementById('officialUrl').value = '';
        showToast('已添加素材，记得点击“保存素材数据”');
    });

    async function saveMaterials() {
        let token = localStorage.getItem('gh_token');
        if (!token) {
            token = prompt('🔐 需要 GitHub Token（repo权限）才能保存素材数据\n获取地址：https://github.com/settings/tokens\n只勾选 repo 即可\n\n粘贴你的 Token：');
            if (token) localStorage.setItem('gh_token', token);
            else return;
        }
        
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(materials, null, 2))));
        const url = `https://api.github.com/repos/${REPO}/contents/materials.json`;
        let sha = null;
        try {
            const get = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            if (get.ok) sha = (await get.json()).sha;
        } catch(e) {}
        
        const res = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
            body: JSON.stringify({ message: 'Update materials', content, sha, branch: 'main' })
        });
        if (res.ok) showToast('✅ 素材数据已保存');
        else showToast('❌ 保存失败，Token 可能无效', true);
    }

    document.getElementById('saveMaterialsBtn').addEventListener('click', saveMaterials);

    // ========== 标签页切换 ==========
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const isUpload = btn.dataset.tab === 'upload';
            document.getElementById('uploadPanel').style.display = isUpload ? 'block' : 'none';
            document.getElementById('materialsPanel').style.display = isUpload ? 'none' : 'block';
            if (!isUpload) loadMaterials();
        });
    });

    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = 'index.html';
    }

    loadMaterials();
</script>
</body>
</html>
